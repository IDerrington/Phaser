<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #2c5aa0; stroke-width: 2; }
      .box-highlight { fill: #d4e8f0; stroke: #1a4480; stroke-width: 2.5; }
      .label { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #1a1a1a; }
      .detail { font-family: Arial, sans-serif; font-size: 13px; fill: #444444; }
      .freq { font-family: Arial, sans-serif; font-size: 12px; fill: #0066cc; font-style: italic; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .note { font-family: Arial, sans-serif; font-size: 11px; fill: #666666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a4480">
    CN0566 Phaser - Receive Signal Path
  </text>

  <!-- Stage 1: Antenna Array -->
  <rect x="250" y="60" width="300" height="70" class="box" rx="5"/>
  <text x="400" y="85" text-anchor="middle" class="label">Antenna Array</text>
  <text x="400" y="105" text-anchor="middle" class="detail">8 Elements (32 patches, λ/2 spacing)</text>
  <text x="400" y="120" text-anchor="middle" class="freq">10.3 GHz RF Signal</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="130" x2="400" y2="170" class="arrow"/>

  <!-- Stage 2: LNA -->
  <rect x="250" y="170" width="300" height="80" class="box-highlight" rx="5"/>
  <text x="400" y="195" text-anchor="middle" class="label">ADL8107 LNA (×8)</text>
  <text x="400" y="215" text-anchor="middle" class="detail">24 dB Gain</text>
  <text x="400" y="233" text-anchor="middle" class="detail">Low Noise Amplification</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="250" x2="400" y2="290" class="arrow"/>

  <!-- Stage 3: ADAR1000 Beamformer -->
  <rect x="250" y="290" width="300" height="100" class="box-highlight" rx="5"/>
  <text x="400" y="315" text-anchor="middle" class="label">ADAR1000 Beamformer (×2)</text>
  <text x="400" y="335" text-anchor="middle" class="detail">Phase: 0–360° (2.8° steps)</text>
  <text x="400" y="353" text-anchor="middle" class="detail">Gain: 0–31 dB (0.5 dB steps)</text>
  <text x="400" y="373" text-anchor="middle" class="freq">Coherent Sum of 8 Channels</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="390" x2="400" y2="430" class="arrow"/>

  <!-- Stage 4: 10.6 GHz LPF -->
  <rect x="250" y="430" width="300" height="70" class="box" rx="5"/>
  <text x="400" y="455" text-anchor="middle" class="label">10.6 GHz Low-Pass Filter</text>
  <text x="400" y="475" text-anchor="middle" class="detail">Remove High-Side Image</text>
  <text x="400" y="490" text-anchor="middle" class="note">(Blocks 14.4 GHz = 12.2 + 2.2)</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="500" x2="400" y2="540" class="arrow"/>

  <!-- Stage 5: LTC5548 Mixer -->
  <rect x="250" y="540" width="300" height="100" class="box-highlight" rx="5"/>
  <text x="400" y="565" text-anchor="middle" class="label">LTC5548 Mixer</text>
  <text x="400" y="585" text-anchor="middle" class="detail">Downconvert: RF - LO = IF</text>
  <text x="400" y="605" text-anchor="middle" class="freq">10.3 GHz RF + 12.5 GHz LO</text>
  <text x="400" y="623" text-anchor="middle" class="freq">→ 2.2 GHz IF</text>

  <!-- LO Input (side arrow) -->
  <line x1="150" y1="590" x2="250" y2="590" class="arrow"/>
  <text x="140" y="585" text-anchor="end" class="note">LO Input</text>
  <text x="140" y="600" text-anchor="end" class="note">(ADF4159)</text>

  <!-- Arrow 5 -->
  <line x1="400" y1="640" x2="400" y2="680" class="arrow"/>

  <!-- Stage 6: 2.5 GHz LPF -->
  <rect x="250" y="680" width="300" height="70" class="box" rx="5"/>
  <text x="400" y="705" text-anchor="middle" class="label">2.5 GHz Low-Pass Filter</text>
  <text x="400" y="725" text-anchor="middle" class="detail">Remove LO Feedthrough</text>
  <text x="400" y="740" text-anchor="middle" class="note">(Blocks 12.5 GHz LO leakage)</text>

  <!-- Arrow 6 -->
  <line x1="400" y1="750" x2="400" y2="790" class="arrow"/>

  <!-- Stage 7: PlutoSDR -->
  <rect x="250" y="790" width="300" height="90" class="box-highlight" rx="5"/>
  <text x="400" y="815" text-anchor="middle" class="label">PlutoSDR (AD9363)</text>
  <text x="400" y="835" text-anchor="middle" class="detail">12-bit ADC @ 61.44 MSPS</text>
  <text x="400" y="853" text-anchor="middle" class="detail">Analog → Digital I/Q Samples</text>
  <text x="400" y="870" text-anchor="middle" class="freq">2.2 GHz IF Input</text>

  <!-- Arrow 7 -->
  <line x1="400" y1="880" x2="400" y2="920" class="arrow"/>

  <!-- Stage 8: IIO Interface -->
  <rect x="250" y="920" width="300" height="70" class="box" rx="5"/>
  <text x="400" y="945" text-anchor="middle" class="label">USB/Ethernet Interface</text>
  <text x="400" y="965" text-anchor="middle" class="detail">IIO Streaming to Host PC</text>
  <text x="400" y="980" text-anchor="middle" class="freq">Digital I/Q Data Stream</text>

  <!-- Arrow 8 -->
  <line x1="400" y1="990" x2="400" y2="1030" class="arrow"/>

  <!-- Stage 9: Host Processing -->
  <rect x="250" y="1030" width="300" height="80" class="box-highlight" rx="5"/>
  <text x="400" y="1055" text-anchor="middle" class="label">Python / Jupyter Notebook</text>
  <text x="400" y="1075" text-anchor="middle" class="detail">Signal Processing</text>
  <text x="400" y="1093" text-anchor="middle" class="detail">Visualization &amp; Analysis</text>

  <!-- Legend Box -->
  <rect x="50" y="1130" width="200" height="60" fill="none" stroke="#999999" stroke-width="1" rx="3"/>
  <text x="60" y="1150" font-size="12" font-weight="bold">Legend:</text>
  <rect x="60" y="1155" width="30" height="15" class="box-highlight" rx="2"/>
  <text x="95" y="1166" font-size="11" fill="#444444">Key Component</text>
  <rect x="60" y="1172" width="30" height="15" class="box" rx="2"/>
  <text x="95" y="1183" font-size="11" fill="#444444">Passive/Filter</text>

  <!-- Footer -->
  <text x="400" y="1190" text-anchor="middle" font-size="10" fill="#888888">
    © Analog Devices Inc. | CN0566 Phaser Platform
  </text>
</svg>